const FOODS=[
{id:"broccoli",name:"Broccoli",emoji:"🥦",sub:"Lightly steamed 3-4 min",fact:"Add mustard to restore sulforaphane after cooking",por:"½ cup cooked (80g)",min:"A few florets daily",res:"Sulforaphane activates the Nrf2 pathway — the body's master antioxidant defense. Cancer Prevention Research (2015): sulforaphane inhibits cancer cell growth. Steaming 3-4 min maximizes sulforaphane retention. Folate deficiency linked to 42% higher depression risk (J Psychiatric Research, 2017).",deep:"Sulforaphane activates 200+ protective genes and boosts glutathione — the body's primary antioxidant. Cooking destroys broccoli's myrosinase enzyme, but adding a pinch of mustard seed or powder after cooking restores sulforaphane production — mustard contains a heat-resistant form of the same enzyme (Mol. Nutr. Food Res., 2018). This works for all cooked cruciferous vegetables. Best prep: steam lightly, or chop raw and wait 40 min before cooking to let myrosinase activate.",nut:{vitC:68,vitK:58,folate:7,fiber:5}},
{id:"kale",name:"Kale",emoji:"🥗",sub:"All varieties — massage raw",fact:"Among the most nutrient-dense foods per calorie",por:"1 handful raw or ½ cup cooked",min:"A handful several times/week",res:"Among the most nutrient-dense foods per calorie. British Journal of Nutrition (2016): cruciferous vegetables associated with lower all-cause mortality. Contains sulforaphane and indole-3-carbinol. Kaempferol and quercetin show anti-depressant effects (Neuroscience Letters, 2016).",deep:"High vitamin K content activates proteins that keep calcium in bones and out of arteries. Lutein and zeaxanthin protect against macular degeneration. Massage raw kale with olive oil to break tough cellulose. Red/purple varieties add anthocyanins. Like broccoli, adding mustard to cooked kale restores sulforaphane production.",nut:{vitK:340,vitA:103,vitC:67,manganese:13}},
{id:"spinach",name:"Spinach",emoji:"🍃",sub:"Raw or cooked — add lemon",fact:"1 serving/day linked to 11 years younger brain",por:"1 handful raw or ½ cup cooked",min:"A handful most days",res:"Rush University Memory and Aging Project (Neurology, 2018): 1-2 servings of leafy greens daily associated with cognitive ability of someone 11 years younger. High nitrates improve vascular function. Rich magnesium source — linked to anti-depressant effects within 2 weeks (Nutrients, 2017).",deep:"Nitrates convert to nitric oxide, widening blood vessels and lowering blood pressure. Cooking increases iron and calcium bioavailability by reducing oxalates. Always pair with lemon/citrus for up to 6x better iron absorption. Contains ecdysteroids that may support muscle protein synthesis.",nut:{vitK:494,vitA:53,folate:33,iron:18,magnesium:20}},
{id:"celery",name:"Celery",emoji:"💚",sub:"Stalks and seeds",fact:"Apigenin: a researched natural anxiolytic",por:"2-3 stalks or 1 cup chopped",min:"A few stalks most days",res:"One of the richest food sources of apigenin — binds to benzodiazepine receptors in the brain (similar to anti-anxiety medication, without addiction risk). Upregulates BDNF, supports serotonin and dopamine (Frontiers in Pharmacology, 2024). Tufts study (Cell Reports, 2024): celery flavones identified as a metabolic marker associated with healthy aging.",deep:"Apigenin targets inflammation, neurotransmitters, BDNF, and autophagy simultaneously — potentially more effective than single-pathway approaches. Celery seed extract reduced anxiety and depression in hypertensive patients in a 4-week clinical study. Also contains 3-n-butylphthalide (3nB) which relaxes blood vessel smooth muscle.",nut:{vitK:30,folate:9,potassium:8,fiber:5}},
{id:"fermented",name:"Fermented Foods",emoji:"🥛",sub:"Kefir, yogurt, kimchi, sauerkraut",fact:"Kefir: up to 61 probiotic strains",por:"1 glass kefir or ½ cup kimchi",min:"1 serving daily",res:"Stanford School of Medicine (Cell, 2021): fermented foods increased microbiome diversity and decreased 19 inflammatory markers — more effective than high-fiber diet alone. Probiotic-rich foods associated with reduced depression and anxiety symptoms (Nutritional Neuroscience, 2020). Kefir contains up to 61 different microbial strains.",deep:"95% of the body's serotonin is produced in the gut — gut health directly impacts mood and sleep via the serotonin-to-melatonin pathway. Kefir improves lactose digestion even in the lactose-intolerant. Homemade versions contain far more diverse organisms than commercial products. Kimchi adds anti-inflammatory benefits from garlic, ginger, and chili.",nut:{calcium:30,vitB12:20,protein:17,probiotics:100}},
{id:"oats",name:"Oats",emoji:"🌾",sub:"Steel-cut or rolled",fact:"Beta-glucan lowers LDL cholesterol 5-10%",por:"½ cup dry (40g)",min:"½ cup daily for effect",res:"BMJ meta-analysis (Aune et al., 2016): whole grain intake associated with reduced cardiovascular disease, cancer, and all-cause mortality. Beta-glucan fiber reduces LDL cholesterol 5-10%. Supports mood via sustained blood glucose and prebiotic support for serotonin-producing gut bacteria (Appetite, 2016).",deep:"Contains avenanthramides — anti-inflammatory compounds rare in other foods. Overnight oats preserve resistant starch, which further benefits gut bacteria. Steel-cut oats have a lower glycemic index than rolled, but both are beneficial. Oats also contain melatonin, and their complex carbohydrates help tryptophan cross the blood-brain barrier — making an evening bowl a natural sleep supporter. Adding berries and nuts creates a synergistic meal.",nut:{manganese:63,fiber:16,protein:13,vitB1:25,magnesium:10}},
{id:"fatty_fish",name:"Fatty Fish",emoji:"🐟",sub:"Salmon, mackerel, sardines, herring",fact:"Highest omega-3 levels linked to 2.2 extra years",por:"1 palm-sized fillet (120g)",min:"2+ servings per week",res:"Framingham Heart Study: participants with highest omega-3 index lived on average 2.2 years longer. Meta-analysis of 26 studies (Translational Psychiatry, 2019): EPA shows significant anti-depressant effects. Whole fish provides omega-3 in a form that appears more beneficial than supplements, likely due to the complete nutritional matrix.",deep:"EPA is anti-inflammatory and mood-supportive; DHA makes up 40% of brain fatty acids. Small oily fish (sardines, mackerel) are lower in mercury than large fish. Canned sardines with bones are an excellent calcium source. J Clinical Sleep Medicine (2014): eating fish 3x per week improved sleep quality, likely via vitamin D and omega-3 supporting serotonin regulation. Wild-caught generally has a better omega-3 to omega-6 ratio than farmed.",nut:{omega3:100,vitD:100,vitB12:100,selenium:80,protein:50}},
{id:"liver",name:"Liver / Liver Pâté",emoji:"🫀",sub:"Pâté on bread, or pan-fried liver",fact:"1 slice of pâté = 150% daily B12",por:"20g liver pâté (1 slice on bread)",min:"Pâté on bread 3-4 days/week",res:"A single slice of liver pâté covers roughly 150% of daily B12 needs. Liver is among the most nutrient-concentrated foods available — pre-formed vitamin A, highly bioavailable B12, folate, iron, copper, and choline. Nutrients (2019): organ meats are notably dense in micronutrients. Choline supports brain function and mood regulation.",deep:"Liver pâté typically contains about one-third liver — a 20g serving provides meaningful B12 and vitamin A, though less than pure liver. For higher doses: chicken liver is mild and iron-rich, beef liver has the highest B12 and vitamin A concentration, and cod liver is an exceptional source of omega-3 and vitamin D. Heme iron in liver is 5-8x better absorbed than plant iron. Limit pure liver to 1-2 servings per week to avoid vitamin A accumulation. Choose pâté with minimal additives.",nut:{vitB12:150,vitA:50,folate:8,iron:5,copper:13,choline:7,selenium:5}},
{id:"pumpkin_seeds",name:"Pumpkin Seeds",emoji:"🎃",sub:"Raw or lightly roasted",fact:"All 3 mood minerals in one food",por:"2 tablespoons (20g)",min:"A small handful most days",res:"Top plant source of all three 'mood minerals' simultaneously: magnesium, zinc, and tryptophan. Magnesium deficiency accelerates cellular aging (Magnesium Research, 2015). Tryptophan is the precursor to serotonin — associated with improved mood within weeks (Nutritional Neuroscience, 2015).",deep:"One of very few foods providing magnesium, zinc, AND tryptophan together — a natural mood support trio. Zinc alone supports 300+ enzymatic reactions in the body. The tryptophan content also supports sleep via the tryptophan → serotonin → melatonin pathway, and magnesium promotes muscle relaxation. A small evening handful may help with both mood and sleep quality. Great on oatmeal, salads, or as a snack.",nut:{magnesium:25,zinc:15,iron:10,protein:12,manganese:17}},
{id:"ginger",name:"Ginger / Galangal",emoji:"🫚",sub:"Fresh root or ground",fact:"2g/day reduces blood sugar ~12%",por:"Thumb-sized piece or ½ tsp ground",min:"A small piece or pinch daily",res:"Comprehensive review (Food Science & Nutrition, 2019): significantly reduces C-reactive protein and TNF-alpha — key inflammatory markers. Metabolism (2012): 2g daily reduced fasting blood sugar by 12%. Gingerol directly modulates serotonin receptors (Bioorganic Chemistry, 2020).",deep:"Blocks COX-2 inflammation without the stomach damage associated with NSAIDs. Inhibits NF-κB — a master switch of chronic inflammation. Fresh ginger contains gingerols; dried/ground contains shogaols (both beneficial). Galangal (Thai ginger) contains galangin with similar anti-inflammatory properties. Excellent in tea, stir-fries, and soups.",nut:{manganese:2}},
{id:"cinnamon",name:"Ceylon Cinnamon",emoji:"🟤",sub:"Ceylon type — not Cassia",fact:"1g/day linked to 18-29% blood sugar reduction",por:"A pinch to ½ tsp",min:"A pinch daily in food or drinks",res:"Meta-analysis (Journal of Medicinal Food, 2011): cinnamon reduces fasting glucose, total cholesterol, and LDL. Diabetes Care (2003): 1g daily reduced blood sugar 18-29% in type 2 diabetics. Has anti-depressant properties via serotonin and dopamine modulation.",deep:"Critical distinction: Cassia cinnamon contains ~1% coumarin (a liver toxin at high doses); Ceylon cinnamon contains only traces. If using daily, always choose Ceylon. Improves insulin sensitivity at the cellular level. Also has antimicrobial properties. A pinch in coffee, oatmeal, or smoothies is enough.",nut:{manganese:15}},
{id:"shellfish",name:"Shellfish",emoji:"🦐",sub:"Shrimp, crab, lobster, oysters",fact:"6 oysters = ~500% daily zinc",por:"80-100g cooked",min:"1-2 servings per week",res:"Oysters are among the richest food sources of zinc. Shrimp contain astaxanthin — a carotenoid with strong antioxidant properties (Marine Drugs, 2014). Rich in B12, zinc, and selenium — all three support mood regulation (Nutritional Neuroscience, 2020).",deep:"Six oysters provide roughly 500% daily zinc, 200% B12, plus copper and selenium. Astaxanthin from shrimp crosses the blood-brain barrier, offering direct neuronal protection from oxidative damage. Frozen shrimp retains virtually all nutritional value. Shellfish are among the most nutrient-dense animal foods available.",nut:{vitB12:400,zinc:50,selenium:65,protein:40,iron:20,omega3:15}},
{id:"mussels",name:"Mussels / Clams",emoji:"🦪",sub:"Blue mussels, clams, cockles",fact:"100g = one full week of B12",por:"100g cooked (~15 mussels)",min:"1-2 servings per week",res:"100g of mussels provides over 600% of daily B12 — enough for an entire week. Also 100% daily manganese, plus significant iron and selenium. European Journal of Clinical Nutrition (2019): regular bivalve consumption associated with improved cardiovascular markers. Low B12 is strongly linked to depression (Psychotherapy and Psychosomatics, 2013).",deep:"Among the most sustainable animal protein sources — mussels filter water, require no feed, and have a very low carbon footprint. Tinned and smoked mussels retain most nutrients. Clams are similarly nutrient-dense. Historically, coastal populations with regular bivalve consumption tend to show good health outcomes. An affordable nutritional powerhouse.",nut:{vitB12:600,iron:40,manganese:100,selenium:75,omega3:20,protein:25}},
{id:"pineapple",name:"Pineapple",emoji:"🍍",sub:"Fresh — eat the core too",fact:"Contains serotonin directly",por:"A thick slice or ½ cup",min:"A few servings per week",res:"Rich in bromelain — an enzyme with anti-inflammatory effects comparable to NSAIDs (Biomedical Reports, 2016). One of few foods that contains serotonin directly. Higher tropical fruit intake associated with lower depression rates (Journal of Affective Disorders, 2020).",deep:"Bromelain is concentrated in the core — eat it for maximum benefit. Aids protein digestion, reduces post-exercise inflammation and swelling. Must be fresh — canning and pasteurization destroy bromelain. Also rich in manganese for bone health and antioxidant defense.",nut:{vitC:66,manganese:38,fiber:5}},
{id:"citrus",name:"Citrus Fruits",emoji:"🍋",sub:"Lemon, orange, grapefruit, lime",fact:"Lemon on greens = 6x iron absorption",por:"Juice of ½ lemon or 1 orange",min:"Juice of ½ lemon daily",res:"BMJ (2017): citrus flavonoid intake associated with reduced cardiovascular disease, stroke, and mortality. Adding lemon to leafy greens boosts non-heme iron absorption up to 6x. Higher citrus consumption inversely associated with depression (European Journal of Clinical Nutrition, 2014).",deep:"Each citrus fruit has unique flavonoids: hesperidin (orange), naringenin (grapefruit), eriocitrin (lemon). Lemon zest contains d-limonene with anti-cancer properties. Vitamin C is essential for collagen synthesis, dopamine production, and iron absorption. Keep a lemon on the counter — squeeze on everything.",nut:{vitC:45,folate:5,fiber:6}},
{id:"berries",name:"Berries",emoji:"🫐",sub:"Blueberries, blackberries, raspberries",fact:"2+ servings/week delays brain aging 2.5 years",por:"A handful (~75g)",min:"A handful most days (frozen works)",res:"Nurses' Health Study (Annals of Neurology, 2012): 2+ servings of berries per week delayed cognitive aging by 2.5 years. RCT (Nutrients, 2020): a blueberry drink improved mood within just 2 hours. Berry flavonoids directly increase BDNF — brain-derived neurotrophic factor.",deep:"Among the highest ORAC (antioxidant capacity) of common fruits. Frozen berries are equally nutritious — picked and frozen at peak ripeness. Wild and smaller berries contain more anthocyanins per gram. Berry fiber selectively feeds beneficial gut bacteria. Affordable year-round when frozen.",nut:{vitC:12,fiber:7,vitK:18,manganese:15}},
{id:"olive_oil",name:"Extra Virgin Olive Oil",emoji:"🫒",sub:"Cold-pressed, peppery taste",fact:"½ tbsp/day linked to 19% lower mortality",por:"1-2 tablespoons",min:"At least ½ tablespoon daily",res:"PREDIMED trial (NEJM, 2018): Mediterranean diet with EVOO reduced cardiovascular events by 30%. Harvard study (JACC, 2022): more than ½ tablespoon daily associated with 19% lower all-cause mortality. Oleocanthal has anti-inflammatory properties similar to low-dose ibuprofen. Also associated with lower depression risk.",deep:"Quality EVOO should taste peppery or slightly bitter — that burning sensation in the throat IS the polyphenols working. Store in dark, cool place. Activates AMPK and sirtuins — longevity pathways. Always check harvest date and use within 18 months. Worth spending more on quality.",nut:{vitE:13,vitK:10,omega3:1}},
{id:"beans",name:"Beans / Lentils",emoji:"🫘",sub:"Black, kidney, white, lentils",fact:"The most consistent longevity food in Blue Zones",por:"½ cup cooked (90g)",min:"½ cup most days",res:"The most consistently consumed food across all five Blue Zone longevity populations. Every 20g daily increase in legume intake associated with 7-8% lower mortality in epidemiological studies. Good source of folate and magnesium — deficiencies in both are linked to higher depression risk (British Journal of Nutrition, 2018).",deep:"Resistant starch in beans feeds gut bacteria that produce butyrate — a compound that supports the gut lining and reduces inflammation throughout the body. Soaking overnight reduces lectins and improves digestibility. Canned beans are nearly as nutritious as dried. Black beans have the highest antioxidant content among common varieties.",nut:{fiber:30,folate:45,iron:19,protein:18,manganese:20,magnesium:10}},
{id:"chickpeas",name:"Chickpeas",emoji:"🧆",sub:"Hummus, roasted, or in stews",fact:"Best tryptophan-to-protein ratio among legumes",por:"½ cup cooked or 3 tbsp hummus",min:"A few servings per week",res:"High in tryptophan — the amino acid precursor to serotonin. RCT (Appetite, 2014): chickpea consumption significantly improved satiety and reduced snacking. Rich in B6 and folate for neurotransmitter synthesis. Mediterranean populations with regular chickpea intake show lower rates of anxiety and depression.",deep:"Best tryptophan-to-protein ratio among legumes — especially effective for mood when combined with carbohydrates. Hummus combines chickpeas + tahini + olive oil + lemon = a remarkably complete nutritional profile in one food. Roasted chickpeas make an excellent crunchy snack with sustained energy.",nut:{fiber:25,folate:35,manganese:42,protein:15,iron:13,zinc:9}},
{id:"avocado",name:"Avocado",emoji:"🥑",sub:"Fresh, including dark green flesh",fact:"Boosts nutrient absorption 2-6x",por:"½ avocado",min:"2-3 times per week",res:"Journal of the American Heart Association (2022): 2+ avocados weekly associated with 16% lower cardiovascular disease and 21% lower coronary heart disease. Significantly improved microbiome diversity. Higher avocado consumption linked to lower depression scores (Nutritional Neuroscience, 2021).",deep:"Adding avocado to a meal increases absorption of carotenoids from other vegetables by 2-6x — it makes your salad more nutritious. Contains more potassium than bananas. Rich in glutathione — the body's master antioxidant. The dark green flesh closest to the skin contains the highest concentration of nutrients.",nut:{fiber:27,vitK:26,folate:20,potassium:14,vitE:14,vitB6:13}},
{id:"sweet_potato",name:"Sweet Potato",emoji:"🍠",sub:"Baked or steamed with skin",fact:"The traditional staple of Okinawan centenarians",por:"1 small or ½ medium",min:"A few servings per week",res:"The traditional staple of Okinawa, Japan — one of the world's original Blue Zones with a high concentration of centenarians. Exceptionally rich in beta-carotene. Protects against oxidative DNA damage (Food Chemistry, 2019). Vitamin B6 supports serotonin and GABA production.",deep:"Okinawan centenarians historically got a large proportion of their calories from purple and orange sweet potatoes. Always eat with a small amount of fat for beta-carotene absorption. The skin contains concentrated fiber and antioxidants — eat it. Purple sweet potatoes add anthocyanins for additional brain benefits.",nut:{vitA:384,vitC:18,manganese:13,fiber:8,vitB6:8}},
{id:"turmeric",name:"Turmeric",emoji:"🟡",sub:"Always with black pepper + fat",fact:"+2000% absorption with black pepper",por:"½ tsp ground (1-2g)",min:"A daily pinch + pepper + fat",res:"Geroscience (2024): curcumin modulates major longevity pathways — sirtuins, AMPK, and mTOR. Piperine from black pepper increases curcumin absorption by 2000%. Meta-analysis (Journal of Affective Disorders, 2017): curcumin reduces depression symptoms comparably to fluoxetine (Prozac).",deep:"The golden rule: ALWAYS combine with black pepper AND a fat source (olive oil, coconut oil). Without pepper, almost no curcumin reaches your bloodstream. Curcumin is both anti-inflammatory and pro-resolution — it helps resolve inflammation, not just suppress it. Fresh turmeric root can be grated like ginger.",nut:{manganese:13,iron:5}},
{id:"nuts",name:"Nuts",emoji:"🥜",sub:"Walnuts, almonds, Brazil nuts, pistachios",fact:"5x/week linked to 39% lower mortality",por:"A small handful (20-30g)",min:"A handful at least 5 days/week",res:"Adventist Health Study-2: eating nuts 5+ times weekly associated with 39% lower all-cause mortality — one of the strongest dietary associations observed. Walnuts are richest in omega-3. Just 1-2 Brazil nuts provide a full day of selenium. Walnut consumers show 26% lower depression scores.",deep:"Each nut has unique strengths: walnuts for omega-3, almonds for vitamin E, Brazil nuts for selenium (limit 1-2 daily). Pistachios contain the highest natural melatonin concentration of any measured food — an evening handful may support sleep quality. Don't peel — the skins contain concentrated polyphenols. Raw or dry-roasted is best. Store in fridge/freezer to prevent omega-3 oxidation.",nut:{omega3:35,manganese:32,vitE:13,magnesium:13,fiber:5,protein:6}},
{id:"tomatoes",name:"Cooked Tomatoes",emoji:"🍅",sub:"Sauce, paste, or roasted",fact:"Cooked with oil = 4x more lycopene absorbed",por:"½ cup sauce or paste",min:"Several times per week",res:"Primary dietary source of lycopene. Neurology (2012): men with highest lycopene levels had 55% lower stroke risk. Cooking with oil increases lycopene bioavailability by 4x. Journal of Affective Disorders (2013): tomato consumption associated with lower depression risk.",deep:"Heat converts trans-lycopene to the more bioavailable cis-form — raw tomatoes provide far less usable lycopene. Tomato paste is the most concentrated source. Canned tomatoes are excellent and often more nutritious than fresh (processed at peak ripeness). Lycopene specifically accumulates in prostate tissue, offering targeted protection.",nut:{vitC:14,vitA:13,potassium:6,lycopene:100}},
{id:"carrots",name:"Carrots",emoji:"🥕",sub:"Cooked with fat for absorption",fact:"Cooked = 6.5x more beta-carotene absorbed",por:"1 medium or ½ cup cooked",min:"A few servings per week",res:"Richest commonly eaten source of beta-carotene. Higher blood carotenoid levels associated with lower all-cause mortality (Journal of Nutrition, 2014). Cooking increases beta-carotene absorption by 6.5x. Higher carotenoid intake linked to lower depression risk (Psychosomatic Medicine, 2012).",deep:"Cook carrots whole, then cut — this preserves 25% more nutrients than cutting before cooking. Beta-carotene converts to vitamin A on demand in the body, so there's no risk of toxicity (unlike pre-formed vitamin A). Purple and black heritage carrots add anthocyanins. Carrot tops are edible and nutritious in pesto or salads.",nut:{vitA:214,vitK:8,fiber:5}},
{id:"garlic",name:"Garlic",emoji:"🧄",sub:"Crush → wait 10 min → then cook",fact:"The 10-minute rule changes everything",por:"1-2 cloves",min:"1 clove most days",res:"Meta-analysis (Journal of Nutrition, 2016): garlic supplementation significantly reduces total cholesterol, LDL, and blood pressure. Iowa Women's Health Study: highest garlic intake associated with reduced colon cancer risk. Aged garlic extract reduces perceived stress and fatigue (JNHA, 2019).",deep:"The 10-minute rule is critical: crushing garlic activates the enzyme alliinase, which converts alliin to beneficial allicin. If you heat garlic immediately after cutting, the enzyme is destroyed before it can work. Always crush or chop, wait 10 minutes, then cook. Black (fermented) garlic has even stronger antioxidant S-allyl cysteine. Also acts as a prebiotic for gut bacteria.",nut:{manganese:4,vitB6:3,vitC:3}},
{id:"onion",name:"Onion",emoji:"🧅",sub:"Red onion is richest",fact:"Red onion: richest common source of quercetin",por:"A few slices or ¼ medium",min:"Regular in cooking",res:"Richest common food source of quercetin — a flavonoid that reduces chronic inflammation and oxidative stress (European Journal of Medicinal Chemistry, 2018). Quercetin shows anti-depressant effects via BDNF upregulation and serotonin modulation (Neuropharmacology, 2015).",deep:"Red onions contain 2-3x more quercetin than white, concentrated in the outer layers — don't over-peel. Quercetin is a natural antihistamine. Fructooligosaccharides (FOS) in onions are prebiotics that specifically feed beneficial Bifidobacteria. Sautéing preserves more quercetin than boiling (which leaches it into water).",nut:{vitC:6,quercetin:100}},
{id:"herbs",name:"Fresh Herbs",emoji:"🌿",sub:"Parsley, basil, rosemary, oregano",fact:"Oregano: 42x the antioxidants of apples per gram",por:"A generous pinch to handful",min:"Use liberally every day",res:"Adding herbs to meals can reduce postprandial insulin response and blood lipids (American Journal of Clinical Nutrition, 2012). Rosemary's carnosic acid directly protects neurons from oxidative damage. Even the aroma of rosemary has been shown to improve mood and cognitive performance in controlled studies.",deep:"Oregano has 42x the antioxidant activity of apples per gram — even small amounts are meaningful. Parsley is rich in apigenin, the same compound that makes celery beneficial for anxiety and neurogenesis. A windowsill herb garden provides fresh herbs year-round for minimal cost. Dried herbs retain most antioxidant value.",nut:{vitK:100,vitC:10,iron:5}},
{id:"eggs",name:"Eggs",emoji:"🥚",sub:"Whole eggs — the yolk is key",fact:"Top dietary source of choline",por:"1-2 eggs",min:"3-7 per week",res:"Top dietary source of choline — essential for brain function. BMJ (2018): study of 500,000 adults found daily egg consumption associated with 18% lower cardiovascular mortality. Choline converts to acetylcholine — the neurotransmitter for memory and mood. Vitamin D deficiency linked to 14% higher depression risk.",deep:"The yolk contains nearly all the nutrition — dietary cholesterol has minimal impact on blood cholesterol for most people. Pasture-raised eggs contain 2-3x more omega-3 fatty acids. Eggs have a perfect biological protein value of 100. Soft-boiled or poached preserves the most nutrients.",nut:{vitB12:23,selenium:28,vitD:6,protein:13,choline:30}},
{id:"kiwi",name:"Kiwi",emoji:"🥝",sub:"Green or gold — try eating the skin",fact:"Measurable mood lift in just 4 days",por:"1 kiwi",min:"1 daily or most days",res:"Landmark RCT at University of Otago (British Journal of Nutrition, 2023): mood improvement was measurable within just 4 days of daily kiwi consumption — faster than any supplement tested. Contains direct serotonin. Vitamin C is essential for dopamine synthesis. Also significantly improves sleep quality: 2 kiwis 1 hour before bed reduced time to fall asleep by 42% and increased sleep duration by 13% (Asia Pacific Journal of Clinical Nutrition, 2011).",deep:"The 4-day mood effect likely comes from the synergy of serotonin + vitamin C + folate working together. The sleep benefits may be related to kiwi's serotonin content (a precursor to melatonin) and its high antioxidant concentration. The fuzzy skin is edible and triples the fiber content — rub off the fuzz and eat the whole fruit. Kiwi contains more vitamin C than an orange. Gold kiwis are sweeter with even higher vitamin C. Actinidin enzyme aids protein digestion.",nut:{vitC:137,vitK:37,fiber:8,potassium:5}},
{id:"dark_chocolate",name:"Dark Chocolate 85%+",emoji:"🍫",sub:"85% cacao minimum",fact:"37% lower cardiovascular disease risk",por:"2-3 squares (15-20g)",min:"A small piece daily",res:"Tufts study (Cell Reports, 2024): salsolinol from chocolate identified as a metabolic marker associated with healthy aging. European Heart Journal (2011): highest chocolate intake associated with 37% lower cardiovascular disease.",deep:"85%+ cacao has 5x more flavanols and 4x less sugar than 50% chocolate — the cacao percentage matters considerably. Theobromine dilates blood vessels and improves cerebral blood flow. Contains compounds that support anandamide production — an endocannabinoid involved in mood regulation. Single-origin chocolate tends to maximise flavanol content. A daily square is a reasonable approach.",nut:{iron:13,magnesium:11,copper:17,manganese:18,fiber:8}},
{id:"capers",name:"Capers",emoji:"🟢",sub:"Rinsed, in salads or on fish",fact:"Quercetin targets senescent cells (senolytics)",por:"1 tablespoon",min:"Use regularly as condiment",res:"One of the richest food sources of quercetin at 180mg per 100g. Quercetin is a senolytic compound — it selectively targets senescent cells that contribute to age-related inflammation (Nature Medicine, 2019). Shown to extend healthspan in animal models (Pharmacological Research, 2020). Also acts as a brain anti-inflammatory.",deep:"Senescent cells accumulate with age and secrete inflammatory compounds (SASP) that can damage surrounding tissue. Quercetin from capers has been shown to selectively clear these cells while leaving healthy cells intact in preclinical research. Small servings deliver meaningful quercetin due to the high concentration. Also contains rutin and kaempferol. Rinse salt-packed capers before use to reduce sodium.",nut:{vitK:10,quercetin:100}},
{id:"green_tea",name:"Green Tea",emoji:"🍵",sub:"Brewed from leaves, not bags",fact:"5+ cups daily linked to 26% lower mortality",por:"1-3 cups",min:"At least 1 cup daily",res:"JAMA (2006): study of 40,000+ Japanese adults found 5+ cups daily associated with 26% lower all-cause mortality. EGCG supports autophagy — cellular maintenance and repair. L-theanine promotes calm, focused alertness via alpha brain waves (Nutrients, 2019).",deep:"L-theanine crosses the blood-brain barrier and promotes alpha brain waves — a state of calm focus similar to meditation. Brew at 70-80°C for 2-3 minutes (boiling water destroys catechins). Adding lemon juice preserves 5-12x more catechins through the acidic stomach. Matcha provides ~3x the EGCG of brewed green tea because you consume the whole leaf.",nut:{manganese:10,catechins:100,lTheanine:100}},
{id:"mushrooms",name:"Mushrooms",emoji:"🍄‍🟫",sub:"Shiitake, maitake, oyster, button",fact:"Primary source of ergothioneine",por:"½ cup cooked",min:"3+ servings per week",res:"Meta-analysis covering 601,000 participants: regular mushroom consumption associated with lower all-cause mortality. Primary dietary source of ergothioneine — proposed as a 'longevity vitamin' by researcher Bruce Ames (PNAS, 2018). Japanese cohort study: eating mushrooms 3+ times weekly associated with substantially lower dementia risk. Penn State (2021): higher mushroom intake linked to reduced depression.",deep:"The human body has a dedicated transporter protein (OCTN1) specifically for ergothioneine — evolutionary evidence of its importance. Blood ergothioneine levels naturally decline after age 60, correlating with increased disease risk. Place mushrooms in sunlight for 30-60 minutes to dramatically increase their vitamin D content. Shiitake and maitake have the highest ergothioneine. Cooking does NOT destroy ergothioneine.",nut:{vitD:33,selenium:20,ergothioneine:100,copper:16}},
{id:"saffron",name:"Saffron",emoji:"🧡",sub:"A few threads in food or warm milk",fact:"Comparable to SSRIs in trials, fewer side effects",por:"A pinch (~5 threads / 15-30mg)",min:"A pinch daily in food or drinks",res:"Meta-analysis of 11 RCTs: large effect size vs placebo for depression (p<0.001). Head-to-head trials show saffron performs comparably to fluoxetine, imipramine, and citalopram (Nutrition Reviews, 2025). 30mg daily for 6 weeks matched sertraline in elderly patients with major depressive disorder. World Federation of Biological Psychiatry: grade A evidence for saffron in treating unipolar depression.",deep:"Works through multiple pathways simultaneously: serotonin reuptake inhibition (similar to SSRIs), BDNF upregulation, and kynurenine pathway modulation (reducing neurotoxic metabolites). Trials consistently report fewer side effects compared to pharmaceutical antidepressants. Also shows benefits for sleep quality and anxiety in clinical studies — a 2021 RCT found improved sleep scores after 8 weeks. Use quality Iranian or Spanish saffron — cheap saffron is frequently adulterated with dyes. The colour should bleed slowly when steeped in warm liquid — instant colour suggests artificial dye.",nut:{manganese:3}},
{id:"beetroot",name:"Beetroot",emoji:"🟣",sub:"Roasted, boiled, or juiced",fact:"Lowers blood pressure within hours",por:"1 small beet or ½ cup",min:"A few servings per week",res:"Rich in dietary nitrates that the body converts to nitric oxide — a potent vasodilator. Journal of Applied Physiology (2013): beetroot juice reduced blood pressure within hours and improved exercise endurance by 16%. Contains betalains — antioxidants found in very few other foods. European Journal of Clinical Nutrition (2021): regular beetroot consumption associated with lower cardiovascular mortality.",deep:"Nitric oxide from beetroot relaxes blood vessel walls, lowering blood pressure and improving oxygen delivery to muscles and brain. The red/purple pigments (betalains) are structurally different from anthocyanins found in berries — they provide independent anti-inflammatory effects. Raw or juiced preserves maximum nitrate content. Cooking reduces some nitrate but betalains survive heat. Also supports liver detoxification through phase 2 enzyme activation.",nut:{folate:20,manganese:16,potassium:11,fiber:9,vitC:8,iron:6}},
{id:"pomegranate",name:"Pomegranate",emoji:"🔴",sub:"Seeds (arils) or pure juice",fact:"Urolithin A supports mitochondrial health",por:"½ pomegranate or ½ cup juice",min:"A few servings per week",res:"Contains punicalagins — polyphenols with strong antioxidant properties. Meta-analysis (Pharmacological Research, 2017): pomegranate reduces systolic blood pressure and inflammatory markers CRP and IL-6. Associated with improved memory in older adults (Evidence-Based Complementary Medicine, 2013). Urolithin A — a gut metabolite of pomegranate — activates mitophagy, the process of clearing damaged mitochondria.",deep:"Urolithin A is being studied as a potential compound for supporting cellular health, and pomegranate is the primary natural dietary source. Mitophagy — clearing dysfunctional mitochondria — is an important process for maintaining cellular energy production. Not everyone's gut bacteria can convert punicalagins to urolithin A initially, but regular consumption may support the development of a favourable microbiome. Clinical trials show pomegranate juice can reduce oxidized LDL. The seeds also provide fiber and punicic acid, a fatty acid with anti-inflammatory properties.",nut:{vitC:17,fiber:11,potassium:10,folate:10}}
];

{c:"Cooked Broccoli/Kale + Mustard",w:"Cooking destroys broccoli's myrosinase enzyme, preventing sulforaphane formation. Adding mustard seed or powder after cooking restores it \u2014 mustard's myrosinase is heat-resistant. Bioavailability increased 4x in human trial (Mol. Nutr. Food Res., 2018).",i:"\uD83E\uDD66\uD83D\uDFE1"},
{c:"Cooked Tomatoes + Olive Oil",w:"Heat breaks cell walls releasing lycopene. Oil increases absorption 4x. Tomato sauce with EVOO is a longevity staple across the Mediterranean.",i:"\uD83C\uDF45\uD83E\uDED2"},

{c:"Berries + Nuts",w:"Synergistic antioxidant protection \u2014 berry anthocyanins + nut polyphenols work through different pathways. The fats in walnuts also improve absorption of berry flavonoids.",i:"\uD83E\uDED0\uD83E\uDD5C"},

const TIPS=[
{t:"Your explanatory style predicts your mental health",b:"Optimistic people tend to explain bad events as temporary (\"this will pass\"), specific (\"this one thing went wrong\"), and external (\"circumstances were tough\"). Pessimists do the opposite: permanent (\"it\'s always like this\"), pervasive (\"everything is ruined\"), and personal (\"it\'s my fault\"). Seligman\'s research shows that explanatory style is a powerful predictor of depression, health outcomes, and professional success — and it can be changed with practice. (Learned Optimism, Seligman; American Psychologist)"},
{t:"A proper warm-up reduces injury risk by up to 50%",b:"A comprehensive warm-up that includes light cardio, dynamic stretching, and movement-specific preparation reduces muscle and tendon injuries significantly. The FIFA 11+ warm-up protocol — originally designed for soccer — reduced serious injuries by 50% in multiple randomized trials and has been adopted across many sports. The key is raising tissue temperature, activating the nervous system, and rehearsing movement patterns. Static stretching before exercise is outdated — save it for after. (British Journal of Sports Medicine, 2010; BMJ)"},
{t:"The peak-end rule: how experiences are remembered determines happiness more than reality",b:"Nobel laureate Daniel Kahneman discovered that we don\'t judge experiences by their total pleasure or pain — we judge them by the most intense moment (the peak) and the final moment (the end). This means: a 2-week vacation ending with a flight cancellation is remembered worse than a 1-week vacation ending with a beautiful sunset. Engineer your endings: leave gatherings on a high note, end workouts with something enjoyable, close each day with a positive ritual. (Psychological Science, 1993; Kahneman; Thinking, Fast and Slow)"},
{t:"Bone broth supports gut lining repair",b:"Bone broth is rich in collagen, glycine, glutamine, and gelatin — amino acids that support the integrity of the intestinal lining. While research is still emerging, glutamine in particular has been shown to maintain tight junctions in the gut wall. Simmer bones with a splash of vinegar (to release minerals) for 12–24 hours. It\'s especially helpful during periods of gut irritation or recovery from illness. (Current Opinion in Clinical Nutrition and Metabolic Care, 2017)"},
{t:"The minimum effective dose: 15 minutes of daily movement changes health outcomes",b:"A landmark Taiwanese study of over 400,000 people found that just 15 minutes of moderate daily exercise reduced all-cause mortality by 14% and increased life expectancy by 3 years compared to being inactive. Every additional 15 minutes provided further benefit, up to about 100 minutes daily. If you\'re currently doing nothing, 15 minutes is enough to meaningfully improve your health trajectory. Remove the pressure of perfection and start small. (The Lancet, 2011; Wen et al.)"},
{t:"Squats are the single most functional exercise",b:"The squat engages more muscles simultaneously than any other exercise — quadriceps, hamstrings, glutes, core, and back. The ability to perform a deep squat is one of the strongest predictors of mobility in old age. If you can\'t currently squat below parallel, start with chair-assisted squats and work your way down. Aim for bodyweight squats daily — cultures that regularly squat (instead of sit) have far lower rates of knee and hip problems. (Journal of Strength and Conditioning Research)"},
{t:"Stair climbing is an underrated longevity exercise",b:"A study found that climbing more than 5 flights of stairs daily was associated with a 20% lower risk of cardiovascular disease. Stair climbing provides vigorous-intensity exercise, strengthens legs, and improves cardiovascular fitness — all in short bursts throughout the day. Take the stairs whenever possible. (Atherosclerosis, 2024)"},
{t:"Morning exercise may be best for fat burning and circadian health",b:"Exercising in the morning — especially before breakfast — can increase fat oxidation by up to 20% compared to exercising after eating. Morning exercise also helps anchor your circadian rhythm by raising cortisol at the appropriate time, which can improve sleep quality at night. A 2022 study found that morning exercisers were more consistent with their routines than those who planned evening workouts. (British Journal of Nutrition, 2013; Journal of Physiology)"},
{t:"Loving-kindness meditation reduces chronic pain and increases social connection",b:"In loving-kindness meditation, you silently repeat phrases of goodwill toward yourself and others (\"May you be happy, may you be healthy\"). A University of North Carolina study found that just 7 weeks of practice increased positive emotions, social connectedness, and life satisfaction. Separately, research at Stanford showed it reduced chronic pain severity and increased pain acceptance. It literally rewires brain regions associated with empathy and compassion. (Journal of Personality and Social Psychology, 2008; Fredrickson et al.; Pain Medicine)"},
{t:"Meaning in life protects mental health even in terrible circumstances",b:"Viktor Frankl\'s observations in concentration camps — that those who found meaning survived longer — have been validated by modern research. A meta-analysis found that meaning in life is inversely correlated with depression, anxiety, and substance abuse, and positively correlated with wellbeing, resilience, and physical health. Meaning comes from three sources: purpose (goals and direction), significance (feeling your life matters), and coherence (life making sense). You don\'t need all three — strengthening any one improves mental health. (Journal of Clinical Psychology, 2016; Steger; Review of General Psychology)"},
{t:"A consistent sleep schedule matters more than total hours",b:"Your body\'s circadian clock controls hormone release, body temperature, and immune function. Irregular sleep times — even with adequate total hours — are associated with metabolic dysfunction, weight gain, and cardiovascular risk. A Harvard study found that social jet lag (sleeping differently on weekends vs. weekdays) increased heart disease risk by 11% per hour of shift. Go to bed and wake up within 30 minutes of the same time daily. (Current Biology, 2015; European Heart Journal)"},
{t:"Ginger is one of nature\'s most effective anti-nausea and anti-inflammatory foods",b:"Ginger contains gingerol, which inhibits the same inflammatory pathways as NSAIDs. It\'s been clinically proven to reduce nausea (including pregnancy-related), lower muscle soreness after exercise by 25%, and reduce osteoarthritis pain. Fresh ginger tea is simple: slice a thumb-sized piece into hot water and steep for 10 minutes. Regular consumption also supports digestion by stimulating gastric motility. (Journal of Pain, 2010; Phytotherapy Research)"},
{t:"Processed food and depression: the link is now well-established",b:"A study of over 10,000 university graduates followed for a decade found that those consuming the most ultra-processed food had a 33% higher risk of developing depression. The mechanisms include gut microbiome disruption, chronic inflammation, blood sugar instability, and nutrient deficiency. Even small shifts matter — replacing just one ultra-processed snack daily with whole food may reduce your risk. (European Journal of Nutrition, 2019; University of Navarra)"},
{t:"The US Army adopted positive psychology to build resilience",b:"The Comprehensive Soldier Fitness program, developed with Martin Seligman, trained over 1 million soldiers in skills including optimism, mental toughness, emotional awareness, and social connection. Evaluations found that trained soldiers showed significantly less PTSD, anxiety, depression, and substance abuse. These same skills — originally developed for preventing depression — are now taught in schools, corporations, and healthcare systems worldwide. (American Psychologist, 2011; Seligman & Fowler)"},
{t:"Garlic\'s allicin needs 10 minutes to activate",b:"When you crush or chop garlic, an enzyme called alliinase produces allicin — a compound with powerful antimicrobial and cardiovascular benefits. But this reaction takes about 10 minutes. If you immediately expose chopped garlic to heat, the enzyme is destroyed before allicin forms. Chop your garlic first, then prep your other ingredients before adding it to the pan. This simple timing trick maximizes its health benefits. (Journal of Nutrition, 2001; Journal of Agricultural and Food Chemistry)"},
{t:"The worst time to eat is late at night",b:"Your body\'s circadian clock affects how you metabolize food. Eating the same meal late at night results in higher blood sugar and insulin spikes than eating it earlier in the day. A study found that late-night eating increased hunger hormones, decreased calories burned, and promoted fat storage. Try to finish your last meal at least 2–3 hours before bed. Your gut has its own circadian rhythm and functions best during daylight hours. (Cell Metabolism, 2022; Brigham & Women\'s Hospital)"},
{t:"Deadlifts build more total-body strength than any other exercise",b:"The deadlift engages every major muscle group — back, legs, core, grip, and shoulders. It\'s one of the most functional movements, mimicking the act of picking things up from the ground. Start light, focus on form, and progressively load. Strong deadlifters typically have exceptional posture and resilient backs. (Journal of Strength and Conditioning Research)"},
{t:"Negative thoughts are just thoughts — not facts",b:"Cognitive behavioral therapy (CBT) — the most evidence-based form of psychotherapy — is built on this principle: your thoughts create your emotions, and thoughts can be inaccurate. When you feel anxious or depressed, investigate your thoughts like a detective. Ask: What evidence supports this thought? What evidence contradicts it? What would I tell a friend who had this thought? Is there an alternative explanation? This skill, called cognitive restructuring, becomes easier with practice. (Cognitive Therapy and Research; Beck Institute)"},
{t:"Recovery is when your body actually gets stronger",b:"Exercise creates controlled stress. Adaptation — muscle growth, cardiovascular improvement, neuroplasticity — happens during rest. Overtraining without adequate recovery leads to elevated cortisol, impaired immunity, and plateaus. Prioritize 48 hours between intense sessions for the same muscle group, get 7–9 hours of sleep, and include at least one complete rest day per week. (Sports Medicine, 2019)"},
{t:"Take your exercise outdoors when possible",b:"Exercising in nature — sometimes called \"green exercise\" — provides benefits beyond indoor exercise. A meta-analysis found that outdoor exercise led to greater improvements in mood, self-esteem, and reduced anxiety compared to the same exercise indoors. Exposure to natural light, fresh air, varied terrain, and the psychological effects of nature all contribute. Even a 20-minute walk in a park measurably reduces cortisol. (Environmental Science & Technology, 2011)"},
{t:"Eat to beat inflammation: the worst offenders to minimize",b:"Research consistently identifies these foods as the most pro-inflammatory: refined sugar and high-fructose corn syrup, trans fats (partially hydrogenated oils), excessive omega-6 oils (soybean, corn oil), processed meats (bacon, hot dogs, sausages), refined carbohydrates (white bread, pastries), and excessive alcohol. You don\'t need to eliminate them completely — just ensure they\'re not the foundation of your diet. (Journal of the American College of Cardiology, 2020) ### Specific Foods & Nutrients"},
{t:"Social connection is as important as diet and exercise for longevity",b:"A meta-analysis of 148 studies found that strong social relationships increase the odds of survival by 50% — an effect comparable to quitting smoking and greater than the effects of exercise or obesity. Loneliness, conversely, increases mortality risk by 26%. Quality matters more than quantity: a few deep, supportive relationships outweigh many superficial ones. Invest in your relationships as seriously as you invest in your physical health. (PLoS Medicine, 2010; Holt-Lunstad et al.)"},
{t:"Having a pet is associated with lower blood pressure and stress",b:"Multiple studies show that pet ownership — particularly dogs — is associated with lower blood pressure, reduced cortisol, and increased oxytocin. The American Heart Association has issued a scientific statement supporting the cardiovascular benefits of pet ownership. Dog owners in particular get the combined benefits of companionship, routine, and increased physical activity through daily walks. (Circulation, 2013; AHA Scientific Statement)"},
{t:"4x4 interval training is one of the most efficient exercise protocols",b:"The Norwegian 4x4 method — four 4-minute intervals at 85–95% of maximum heart rate, separated by 3-minute recovery periods — dramatically improves cardiovascular fitness. Research from NTNU in Trondheim shows it increases VO2max (your aerobic capacity) more effectively than moderate continuous exercise. Higher VO2max is one of the strongest predictors of longevity. Even once a week provides significant benefits. (Circulation, 2012; Wisløff et al., NTNU)"},
{t:"Frozen vegetables are just as nutritious as fresh — sometimes more so",b:"Frozen vegetables are typically flash-frozen within hours of harvesting, locking in nutrients at their peak. \"Fresh\" supermarket vegetables may have traveled for days or weeks, losing vitamins along the way. Studies show that frozen peas, spinach, and green beans retain equal or higher levels of vitamins C, E, and folate compared to their \"fresh\" counterparts. Keep your freezer stocked. (Journal of Food Composition and Analysis, 2017)"},
{t:"Acts of kindness boost your own wellbeing more than self-focused pleasure",b:"Studies consistently show that spending money on others produces greater and longer-lasting happiness than spending on yourself. Performing 5 random acts of kindness in a single day increases happiness for the entire week. This isn\'t selflessness — it\'s neuroscience. Helping others activates the brain\'s reward circuitry and releases oxytocin and serotonin. (Science, 2008; Dunn et al.; Journal of Social Psychology)"},
{t:"Stretching for 10 minutes daily reduces arterial stiffness",b:"A study from the University of Milan found that 12 weeks of daily stretching improved arterial flexibility — an independent predictor of cardiovascular health. Flexible muscles and fascia help blood vessels maintain elasticity. Focus on hamstrings, hip flexors, calves, and shoulder openers. Stretching also reduces injury risk, improves posture, and can lower blood pressure. Morning or evening routines are equally effective. (Journal of Physiology, 2020)"},
{t:"Dark leafy greens may slow brain aging by up to 11 years",b:"The MIND study found that people who consumed about 1 serving of leafy greens daily had significantly slower cognitive decline over 5 years — their brains appeared 11 years younger on cognitive tests. Spinach, kale, collard greens, and Swiss chard are rich in folate, vitamin K, lutein, and nitrates, all of which support brain function. (Neurology, 2018; Rush University Medical Center)"},
{t:"Tart cherries are one of few natural sources of melatonin",b:"Tart (Montmorency) cherries contain significant amounts of melatonin and have been shown to improve sleep quality and duration in multiple studies. Drinking tart cherry juice concentrate twice daily increased sleep time by an average of 84 minutes in adults with insomnia. They\'re also potent anti-inflammatories — studies show they reduce post-exercise muscle pain. (European Journal of Nutrition, 2012; Journal of Medicinal Food)"},
{t:"Hydration affects everything — including your brain performance",b:"Even mild dehydration (1–2% body weight loss) impairs concentration, increases fatigue, and worsens mood. Your brain is about 75% water. A study found that dehydrated participants made significantly more errors on cognitive tests. The old \"8 glasses a day\" is a rough guide — your actual needs depend on activity level, climate, and body size. A simple check: your urine should be pale yellow. (Journal of Nutrition, 2012; Armstrong et al.)"},
{t:"Flaxseeds are a tiny nutritional powerhouse",b:"Ground flaxseeds provide ALA omega-3s, soluble fiber, and lignans — compounds with strong anti-cancer properties. A meta-analysis found that flaxseed consumption significantly reduced blood pressure. The key is grinding them — whole flaxseeds pass through your body undigested. Store ground flaxseed in the freezer to prevent oxidation. Add 1–2 tablespoons daily to smoothies, oatmeal, or yogurt. (Clinical Nutrition, 2016; Journal of Nutrition)"},
{t:"The \"Best Possible Self\" exercise rewires your brain for optimism",b:"Write for 15 minutes about your life in the future where everything has gone as well as possible — career, relationships, health, personal growth. Imagine you\'ve worked hard and achieved all your goals. Research from the University of Missouri found that doing this for just 4 days increased positive emotions and optimism for weeks afterward. Unlike fantasy, this exercise activates goal-directed planning circuits in the brain. It simultaneously makes you feel better *and* clarifies what you actually want. (Journal of Positive Psychology, 2011; Sheldon & Lyubomirsky; Journal of Behavior Therapy and Experimental Psychiatry)"},
{t:"Sleep is the single best legal performance enhancer",b:"Stanford sleep researchers extended basketball players\' sleep to 10 hours per night for 5–7 weeks. Sprint times improved, free-throw accuracy increased by 9%, and three-point accuracy increased by 9.2%. Reaction time, mood, and fatigue all improved. Similar results have been found in tennis, swimming, and football. If you\'re trying to improve at anything — sport, music, study, work — sleep more before adding anything else. (Sleep, 2011; Mah et al., Stanford)"},
{t:"How you talk to yourself matters as much as how others talk to you",b:"Internal dialogue shapes neural pathways. Research by Ethan Kross found that using your own name or \"you\" in self-talk (instead of \"I\") creates psychological distance that reduces anxiety and improves performance. \"You can handle this\" is more effective than \"I can handle this.\" This small shift activates regions associated with coaching others — essentially, you become your own advisor. (Journal of Personality and Social Psychology, 2014; Kross et al.)"},
{t:"Berries are nature\'s brain protectors",b:"The Nurses\' Health Study, following over 16,000 women, found that those who ate the most blueberries and strawberries delayed cognitive aging by up to 2.5 years. Berries are among the richest sources of anthocyanins and flavonoids — compounds that cross the blood-brain barrier and reduce inflammation in brain regions essential for memory. Half a cup of berries daily is enough to see benefits. (Annals of Neurology, 2012; Harvard School of Public Health)"},
{t:"Spending money on experiences makes you happier than spending on things",b:"Research from Cornell University found that experiential purchases (travel, classes, concerts, meals out) produce more lasting happiness than material purchases (clothing, electronics, gadgets). The reason is threefold: experiences become part of your identity, they connect you to other people, and they\'re harder to compare unfavorably to alternatives. Even experiences that go wrong become good stories. When budgeting, prioritize experiences over objects. (Journal of Consumer Psychology, 2014; Gilovich & Kumar; Psychological Science)"},
{t:"Exercise is social medicine — prescribing group activity reduces loneliness",b:"The British Journal of Sports Medicine called exercise \"the most important prescription a doctor can write.\" Group exercise classes, walking groups, team sports, and training partners provide both physical benefits and social connection — the combination that longevity research consistently identifies as most powerful. A study found that group exercise participants reported 26% lower stress and significantly higher quality of life compared to solo exercisers. (British Journal of Sports Medicine, 2017; Journal of the American Osteopathic Association)"},
{t:"NEAT: the calories you burn without \"exercising\" matter enormously",b:"Non-exercise activity thermogenesis (NEAT) — fidgeting, standing, walking while on the phone, taking stairs, cooking — can vary by up to 2,000 calories per day between individuals. Increasing NEAT is often more sustainable than formal exercise. Standing desks, walking meetings, parking farther away, and household chores all add up. Research shows that high-NEAT individuals have significantly lower obesity rates. (Science, 2005; Levine)"},
{t:"Your body can only absorb about 25–30g of protein per meal",b:"Research shows that muscle protein synthesis maxes out at about 0.4g protein per kg body weight per meal (roughly 25–30g for most adults). Eating 60g in one meal doesn\'t double the benefit — the excess is used for energy or storage. Spread protein intake across 3–4 meals for optimal muscle maintenance, especially as you age. Include a protein source at every meal. (Journal of the American Dietetic Association, 2009; Muscle & Nerve)"},
{t:"Green bananas are a resistant starch powerhouse",b:"Before they ripen, bananas contain high levels of resistant starch that feeds beneficial gut bacteria. As bananas ripen and turn yellow, the starch converts to sugar. If you can tolerate the taste, slightly green bananas are one of the easiest resistant starch sources. Other excellent sources include cooled potatoes, lentils, chickpeas, and oats. (British Journal of Nutrition; Frontiers in Nutrition, 2022)"},
{t:"Meditation physically changes your brain in 8 weeks",b:"Harvard researchers found that 8 weeks of mindfulness meditation (27 minutes daily) increased gray matter density in brain regions involved in learning, memory, and emotional regulation, while decreasing density in the amygdala (stress center). You don\'t need to meditate for an hour — even 10 minutes daily produces measurable brain changes over time. Start with guided meditations if you\'re new to the practice. (Psychiatry Research: Neuroimaging, 2011; Hölzel et al.)"},
{t:"Deep breathing activates your vagus nerve and reduces inflammation",b:"The vagus nerve — the longest cranial nerve — connects your brain to your gut, heart, and immune system. Slow, deep breathing (especially with a longer exhale than inhale) stimulates the vagus nerve, shifting your nervous system from \"fight or flight\" to \"rest and digest.\" Box breathing (4 seconds in, 4 hold, 4 out, 4 hold) or physiological sighs (double inhale through the nose, long exhale through the mouth) are two evidence-based techniques for rapid calm. (Frontiers in Human Neuroscience, 2018)"},
{t:"Chronic inflammation is the common thread in aging diseases",b:"Heart disease, cancer, type 2 diabetes, Alzheimer\'s, and depression all share a common driver: chronic low-grade inflammation. Unlike acute inflammation (which heals injuries), this silent, persistent inflammation gradually damages tissues. The Mediterranean diet — rich in olive oil, fish, vegetables, nuts, and whole grains — consistently reduces inflammatory markers. A meta-analysis of over 12 million participants found it reduces all-cause mortality by 8%. (BMJ, 2023; European Journal of Clinical Nutrition)"},
{t:"Gratitude practice once a week may be more effective than daily",b:"While the Three Good Things exercise works well daily, research by Robert Emmons found that weekly gratitude journaling actually produced stronger effects on wellbeing than daily practice. The theory: daily practice can feel routine, while weekly practice preserves the freshness of reflection. Try a longer weekly session where you deeply reflect on 5–10 things you\'re grateful for, rather than rushing through a daily list. (Journal of Personality and Social Psychology, 2003; Emmons & McCullough)"},
{t:"Sleep trackers give useful trends but inaccurate stage data",b:"Consumer wearables (Fitbit, Apple Watch, Oura) can track total sleep time and consistency reasonably well, but their deep sleep and REM estimates can be off by 20–50% compared to clinical polysomnography. Use them for trend tracking — consistent bedtimes, total duration, and sleep efficiency — but don\'t obsess over specific stage minutes. Ironically, worrying about sleep data (called \"orthosomnia\") can worsen sleep quality. (Journal of Clinical Sleep Medicine, 2017; Sleep Health)"},
{t:"Breathing properly during exercise dramatically improves performance",b:"Most people hold their breath during hard efforts, spiking blood pressure and reducing power output. For strength training, exhale during the effort (the push or pull) and inhale during the return. For running, a 3:2 breathing rhythm (3 steps inhale, 2 steps exhale) reduces side stitches and improves oxygen delivery. Nasal breathing during low-intensity exercise filters and warms air, produces nitric oxide, and improves CO2 tolerance over time. (Journal of Strength and Conditioning Research; International Journal of Kinesiology)"},
{t:"Green tea\'s EGCG is a longevity compound",b:"Epigallocatechin gallate (EGCG), the main catechin in green tea, has been extensively studied for its anti-cancer, anti-inflammatory, and metabolic benefits. A Japanese study of over 40,000 adults found that drinking 5 or more cups of green tea per day was associated with a 12% lower risk of all-cause mortality. If you don\'t drink that much, even 2–3 cups daily provide meaningful benefits. Avoid adding milk, as it may reduce catechin absorption. (JAMA, 2006; Kuriyama et al.)"},
{t:"Eating within a consistent daily window improves sleep quality",b:"Your digestive system follows a circadian rhythm. Eating at irregular times — especially late at night — disrupts peripheral circadian clocks in the liver, gut, and pancreas, which can desynchronize from your central brain clock. This circadian disruption impairs sleep architecture. Maintaining a consistent 10–12 hour eating window (e.g., 7 AM to 7 PM) supports both metabolic and sleep health. (Cell Metabolism, 2019; Panda, The Circadian Code)"},
{t:"The 3-2-1 rule for better sleep",b:"Three simple cutoffs that improve sleep quality: stop eating 3 hours before bed (prevents acid reflux and late-night blood sugar disruption), stop working 2 hours before bed (allows mental wind-down), stop screens 1 hour before bed (reduces blue light and mental stimulation). This simple framework is easier to follow than complex sleep hygiene lists and addresses the three biggest sleep disruptors in modern life. (Sleep Medicine Reviews; Harvard Health)"},
{t:"Cognitive flexibility — the ability to shift thinking — protects against anxiety",b:"People with high cognitive flexibility can reframe situations, see multiple perspectives, and adapt when circumstances change. Those with rigid thinking patterns are more vulnerable to anxiety, depression, and post-traumatic stress. Build flexibility by: playing devil\'s advocate with your own opinions, exposing yourself to diverse viewpoints, learning new skills, and practicing \"what else could this mean?\" when confronted with ambiguous situations. (Cognitive Therapy and Research; Journal of Abnormal Psychology)"},
{t:"Awe experiences promote physical health",b:"Research from UC Berkeley found that regular experiences of awe — from nature, art, music, or human achievement — reduce inflammatory cytokines more than any other positive emotion studied. Awe makes us feel small in a good way, shifting focus away from self-centered rumination. Seek awe deliberately: visit somewhere with a vast view, watch a stunning documentary, listen to transcendent music, or observe something under a microscope. (Emotion, 2015; Stellar et al.)"},
{t:"One night of poor sleep impairs decision-making as much as alcohol intoxication",b:"After 17 hours of continuous wakefulness, cognitive impairment equals a blood alcohol concentration of 0.05%. After 24 hours, it equals 0.10% — legally drunk in most countries. Sleep-deprived brains particularly struggle with risk assessment, emotional regulation, and creative problem-solving. When facing an important decision after poor sleep, delay it if possible. (Occupational and Environmental Medicine, 2000; Nature, 2017)"},
{t:"Helping others with their problems reduces your own stress more than self-care",b:"A study in Clinical Psychological Science found that performing acts of kindness on stressful days buffered the negative effect of stress on mood and wellbeing — more effectively than receiving support or engaging in self-care activities. The mechanism appears to be a shift in self-focus: when helping others, the brain\'s default mode network (associated with rumination) quiets down. Even small gestures — holding a door, complimenting a colleague, texting an encouraging message — count. (Clinical Psychological Science, 2015; Raposa et al.)"},
{t:"Exercise protects your telomeres from shortening",b:"Telomeres — the protective caps on your chromosomes — shorten with age and stress. But regular exercisers have significantly longer telomeres than sedentary individuals, suggesting a slower rate of biological aging. The effect is equivalent to being biologically about 10 years younger. Moderate exercise 3–5 times per week is sufficient. (Preventive Medicine, 2017; Brigham Young University)"},
{t:"Your gut microbiome influences food cravings",b:"Research suggests that gut bacteria can manipulate your food preferences to benefit their own survival. Bacteria that thrive on sugar send signals that increase your craving for sugar. When you shift your diet toward fiber-rich foods, the bacterial community changes within days, and cravings can shift too. If you\'re trying to reduce sugar, know that the cravings often peak around day 3–4 and diminish significantly by week 2 as your microbiome adapts. (BioEssays, 2014; Alcock et al.)"},
{t:"The 2-minute rule: the easiest way to build habits",b:"When starting any new behavior, reduce it to a version that takes less than 2 minutes. \"Read before bed\" becomes \"read one page.\" \"Meditate\" becomes \"sit for 2 minutes.\" \"Journal\" becomes \"write one sentence.\" The point isn\'t the 2 minutes — it\'s establishing the identity and the neural pathway. Once showing up is automatic, duration naturally increases. James Clear\'s research shows that consistency of action matters far more than size of action. (Atomic Habits, Clear; European Journal of Social Psychology, 2010)"},
{t:"Napping strategically boosts performance without hurting night sleep",b:"A 20-minute nap (or less) between 1–3 PM improves alertness, performance, and mood without entering deep sleep — which would cause grogginess. NASA found that a 26-minute nap improved pilot performance by 34% and alertness by 54%. But napping too long or too late in the day reduces sleep pressure and can delay nighttime sleep. Set an alarm. (Sleep, 2009; NASA research)"},
{t:"Rowing is the most complete cardio exercise",b:"Rowing engages 86% of your muscles — legs, core, back, shoulders, and arms — in every stroke. Unlike running (primarily lower body) or cycling (quadricep-dominant), rowing provides balanced full-body conditioning with minimal joint impact. Studies show rowing improves cardiovascular fitness as effectively as running while building significantly more upper body and core strength. 20 minutes of rowing provides a remarkably comprehensive workout. (British Journal of Sports Medicine; Scandinavian Journal of Medicine & Science in Sports)"},
{t:"Eccentric exercise builds strength faster and protects joints",b:"Eccentric contractions — the lowering phase (lowering a weight slowly, walking downhill, the down phase of a push-up) — create greater muscle tension and more effectively stimulate strength adaptations than concentric (lifting) movements. Studies show that emphasizing the eccentric phase also strengthens tendons and reduces injury risk. Take 3–4 seconds to lower during any exercise. Nordic hamstring curls, for example, have dramatically reduced hamstring injuries in athletes. (British Journal of Sports Medicine, 2019)"},
{t:"Physical posture affects your psychological state",b:"Research shows that expansive postures (standing tall, shoulders back, open chest) increase testosterone and reduce cortisol, while contracted postures (hunched, arms crossed) do the opposite. While the original \"power pose\" research had replication issues, the broader finding that posture influences mood and confidence is well-supported. Simply sitting up straight and taking space increases self-reported confidence and reduces stress reactivity. (Psychological Science; Health Psychology)"},
{t:"Journaling before bed reduces time to fall asleep by 50%",b:"A study found that participants who spent 5 minutes writing a specific to-do list for the next day fell asleep 9 minutes faster than controls — and those who wrote more detailed lists fell asleep even faster. The mechanism: offloading unfinished tasks onto paper reduces the cognitive arousal of an active to-do list running in your mind. This is more effective than writing about completed activities. (Journal of Experimental Psychology, 2018; Baylor University)"},
{t:"Walking is profoundly underestimated",b:"A meta-analysis found that every 2,000 steps per day above baseline reduced cardiovascular mortality by 8–11%. Walking 7,000–10,000 steps daily is associated with up to 70% lower mortality risk compared to walking less than 5,000 steps. Walking also improves creativity — Stanford researchers found it increased creative output by an average of 60%. You don\'t need to run marathons; walking briskly is one of the most powerful health interventions available. (JAMA Internal Medicine, 2022; European Journal of Preventive Cardiology)"},
{t:"Intermittent eating windows: the evidence is clearest for time-restricted eating",b:"While debate continues about various fasting protocols, the most consistent evidence supports simply eating within a 10–12 hour window each day (for example, 8 AM to 6 PM). This aligns eating with your circadian rhythm and allows adequate overnight fasting for cellular housekeeping. A Salk Institute study found that mice eating within a 10-hour window were healthier regardless of diet quality. (Cell Metabolism, 2019; Salk Institute)"},
{t:"Saffron performs as well as Prozac for mild-to-moderate depression",b:"Multiple randomized clinical trials have found that 30 mg of saffron extract daily is as effective as fluoxetine (Prozac) and imipramine for treating mild-to-moderate depression, with far fewer side effects. The active compounds crocin and safranal appear to modulate serotonin metabolism. While not a replacement for professional treatment in severe cases, it\'s a remarkable finding for a kitchen spice. (Journal of Ethnopharmacology, 2015; Human Psychopharmacology, 2014)"},
{t:"The five pillars of longevity are simple, interconnected, and free",b:"Across all research on human longevity, five factors consistently emerge: regular physical activity, a whole-food plant-rich diet, quality sleep, strong social connections, and a sense of purpose. These aren\'t independent — they reinforce each other. Exercise improves sleep. Better sleep improves food choices. Good nutrition supports mood. Positive mood strengthens relationships. Purpose motivates all of it. Start with the one that feels most achievable and let the momentum carry you. (Blue Zones Research; The Lancet; WHO Global Action Plan)"},
{t:"Autonomy is one of the strongest predictors of life satisfaction",b:"Self-determination theory, developed by Deci and Ryan, identifies three basic psychological needs: autonomy (feeling in control of your choices), competence (feeling capable), and relatedness (feeling connected). Of these, autonomy consistently shows the strongest relationship with wellbeing across cultures. Even small acts of choosing — selecting your exercise, your meals, your schedule — increase motivation and satisfaction. When you feel stuck, ask: \"Where in my life can I increase my sense of choice?\" (Psychological Inquiry, 2000; Deci & Ryan)"},
{t:"Weight-bearing exercise is the best defense against osteoporosis",b:"Bone responds to mechanical stress by becoming denser — this is Wolff\'s Law. Walking, running, jumping, and strength training all apply stress that stimulates bone formation. Swimming and cycling, while excellent for cardiovascular health, provide minimal bone-building stimulus because water and wheels support your weight. Women over 50 and men over 70 should prioritize weight-bearing exercise at least 3 times per week. (Journal of Bone and Mineral Research, 2018; National Osteoporosis Foundation)"},
{t:"Sitting is the new smoking — but not if you interrupt it",b:"Sitting for more than 8 hours daily without movement breaks increases mortality risk by 60%. But research shows that breaking up sitting with just 5 minutes of light walking every 30 minutes significantly reduces blood sugar spikes, blood pressure, and fatigue. Set a timer. Stand up, walk to the kitchen, do a few stretches. These micro-breaks matter more than you think. (Annals of Internal Medicine, 2017; Medicine & Science in Sports & Exercise)"},
{t:"Your genes are not your destiny: lifestyle affects gene expression",b:"The field of epigenetics shows that diet, exercise, sleep, stress, and social connection all affect which genes are turned on or off. Dean Ornish\'s research demonstrated that comprehensive lifestyle changes altered the expression of over 500 genes in just 3 months — upregulating disease-preventing genes and downregulating disease-promoting ones. Your daily choices speak directly to your DNA. (Proceedings of the National Academy of Sciences, 2008; Ornish et al.)"},
{t:"Reading fiction builds empathy and social intelligence",b:"Research from the New School for Social Research found that reading literary fiction — as opposed to nonfiction or popular fiction — significantly improved participants\' ability to understand others\' mental states (known as \"theory of mind\"). This social cognition skill is fundamental to relationships, leadership, and emotional intelligence. Reading before bed has the added benefit of being an excellent wind-down routine. (Science, 2013; Kidd & Castano)"},
{t:"Writing a letter of gratitude produces the largest single happiness boost measured",b:"Of all the positive psychology interventions tested, the gratitude visit — writing a detailed letter of gratitude to someone who has been kind to you and reading it to them in person — produces the single largest immediate increase in happiness. Seligman\'s original study found effects lasting up to one month from a single visit. You don\'t have to read it in person — even sending the letter produces a significant effect. Most people never learn how much they meant to someone. (American Psychologist, 2005; Seligman et al.; Journal of Positive Psychology)"},
{t:"Simple journaling prompts that actually change your mindset",b:"Beyond free-writing, structured prompts produce specific psychological benefits. \"What am I assuming and is it true?\" builds critical thinking. \"What went well and what was my role?\" builds agency. \"What would I advise a friend in this situation?\" activates self-compassion. \"What is one thing I can control right now?\" reduces overwhelm. Use the same prompt daily for a week, then switch. Consistency with a specific prompt produces deeper changes than occasional varied journaling. (Cognitive Therapy and Research; Journal of Clinical Psychology)"},
{t:"Spice up your food — herbs and spices are concentrated medicine",b:"Gram for gram, herbs and spices contain more antioxidants than any other food category. One teaspoon of dried oregano has the antioxidant power of a cup of sweet potatoes. Cloves, cinnamon, turmeric, oregano, and rosemary are among the highest. Using herbs and spices generously not only makes food tastier but adds significant anti-inflammatory compounds to every meal. (Journal of Agricultural and Food Chemistry)"},
{t:"Laughter reduces cortisol by 39% and increases endorphins",b:"A Loma Linda University study found that watching a humorous video reduced cortisol by 39%, epinephrine by 70%, and increased endorphin levels significantly. Laughter also improves blood vessel function for up to 24 hours and activates T-cells and natural killer cells in the immune system. Make humor a daily practice — watch comedy, spend time with funny friends, or cultivate the ability to find absurdity in daily life. (Alternative Therapies in Health and Medicine, 2006)"},
{t:"Legumes are the #1 food common to all Blue Zone diets",b:"Blue Zones are regions where people live measurably longer lives. The one dietary factor common to all five zones (Okinawa, Sardinia, Nicoya, Ikaria, Loma Linda) is daily legume consumption — beans, lentils, chickpeas, or peas. They provide fiber, resistant starch, protein, and are among the most affordable foods on earth. Aim for at least half a cup daily. (American Journal of Clinical Nutrition, 2004; Buettner, Blue Zones)"},
{t:"Journaling for 15 minutes reduces stress hormones measurably",b:"Expressive writing about stressful experiences — known as Pennebaker journaling — reduces cortisol levels and improves immune markers within days. The practice of externalizing thoughts onto paper reduces the cognitive load of carrying them internally. You don\'t need to write elegantly — stream of consciousness for 15 minutes about whatever is bothering you is sufficient. Burning or discarding the pages afterward is fine; the benefit is in the writing itself. (Psychosomatic Medicine; Advances in Psychiatric Treatment)"},
{t:"Weighted blankets reduce insomnia and anxiety",b:"A randomized controlled trial found that patients with insomnia who used a weighted blanket (approximately 10% of body weight) showed significantly improved sleep quality, reduced fatigue, and decreased symptoms of anxiety and depression. The deep pressure stimulation activates the parasympathetic nervous system — similar to being held or swaddled. Effects were maintained at 12-month follow-up. (Journal of Clinical Sleep Medicine, 2020; Karolinska Institute)"},
{t:"Box breathing calms the nervous system in under 2 minutes",b:"Inhale for 4 seconds, hold for 4 seconds, exhale for 4 seconds, hold for 4 seconds. Repeat 4 cycles. This technique, used by Navy SEALs and first responders, activates the parasympathetic nervous system and reduces cortisol within minutes. The holds are key — they increase CO2 tolerance, which reduces the panic response. For an even stronger calming effect, extend the exhale to 6–8 seconds while keeping the inhale at 4. (Frontiers in Human Neuroscience, 2018; Journal of Neuropsychology)"},
{t:"Brazil nuts: just 2 per day gives you all the selenium you need",b:"Selenium is an essential trace mineral for thyroid function, immune health, and DNA repair. A single Brazil nut contains 68–91 mcg of selenium — the daily recommendation is 55 mcg. Eating just 1–2 Brazil nuts daily is the simplest way to meet your needs. But don\'t overdo it: selenium toxicity is possible with excessive intake (more than 5–6 nuts daily over time). (American Journal of Clinical Nutrition; USDA FoodData Central)"},
{t:"Morning sunlight is the most powerful circadian reset",b:"Getting bright light within 30–60 minutes of waking sets your circadian clock for the entire day. It suppresses morning melatonin, triggers cortisol\'s healthy morning peak, and programs melatonin to release at the right time that evening. Aim for 10–30 minutes of outdoor light (even on cloudy days, outdoor light is 10–100x brighter than indoor light). This single habit can improve both energy during the day and sleep at night. (Journal of Clinical Endocrinology & Metabolism; Huberman Lab, Stanford)"},
{t:"Vitamin D is actually a hormone, and most people are low",b:"Vitamin D is technically a hormone that affects over 1,000 genes. It\'s essential for immune function, bone health, mood regulation, and muscle function. Studies link deficiency to depression, autoimmune disease, and increased mortality. Your skin produces it from sunlight, but in Northern latitudes (above 37°N), UV-B rays are too weak from October to March. If you\'re not getting regular sun, consider supplementing with 1,000–2,000 IU daily. Get your levels checked — optimal blood levels are 30–50 ng/mL. (NEJM, 2007; Holick)"},
