    else miss.forEach(function(f){h+='<div style="display:flex;align-items:center;gap:5px;margin-bottom:2px;font-size:9px"><span style="font-size:12px">'+f.emoji+'</span><span style="color:#C4DCC4">'+f.name+'</span><span style="font-size:7px;color:#6B9B6B;margin-left:auto">'+f.min+'</span></div>'});
    h+='</div></div>';
  }
  h+='</div>';

  // ========== ZOOM POPUP ==========
  if(S.showZoom){
    h+='<div onclick="S.showZoom=false;render()" style="position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:998;display:flex;align-items:center;justify-content:center;padding:20px"><div onclick="event.stopPropagation()" style="background:linear-gradient(135deg,#1a2e1a,#0d1f15);border-radius:14px;border:1px solid rgba(107,155,107,0.25);padding:20px;max-width:260px;width:100%;text-align:center">';
    h+='<div style="font-size:12px;color:#C4DCC4;margin-bottom:14px">\uD83D\uDD0D Text size</div>';
    ZOOM_LEVELS.forEach(function(lv,i){
      var sel=i===zoomIdx;
      h+='<button onclick="setZoom('+i+')" style="display:block;width:100%;padding:10px;margin-bottom:6px;border-radius:10px;border:1.5px solid '+(sel?'#22C55E':'rgba(107,155,107,0.2)')+';background:'+(sel?'rgba(34,197,94,0.15)':'rgba(107,155,107,0.04)')+';color:'+(sel?'#86EFAC':'#C4DCC4')+';font-size:'+(10+i*3)+'px;font-family:inherit;font-weight:'+(sel?'bold':'normal')+'">'+lv.label+(sel?' \u2713':'')+'</button>';
    });
    h+='</div></div>';
  }

  // ========== TIP OF THE DAY ==========
  if(S.showTip){
    var tipIdx=getTipIndex(),tip=TIPS[tipIdx];
    h+='<div onclick="closeTip()" style="position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:1001;display:flex;align-items:center;justify-content:center;padding:16px"><div onclick="event.stopPropagation()" style="background:linear-gradient(135deg,#1a2e1a,#0d1f15);border-radius:14px;border:1px solid rgba(250,204,21,0.2);padding:20px;max-width:480px;width:100%;max-height:82vh;overflow:auto">';
    h+='<div style="text-align:center;margin-bottom:12px"><span style="font-size:32px">\uD83D\uDCA1</span></div>';
    h+='<div style="font-size:'+(12+cs)+'px;font-weight:bold;color:#FDE68A;text-align:center;margin-bottom:12px;line-height:1.4">'+tip.t+'</div>';
    h+='<div style="font-size:'+(10+cs)+'px;color:#C4DCC4;line-height:1.7;text-align:left">'+tip.b+'</div>';
    h+='<div style="text-align:center;margin-top:14px;font-size:7px;color:#5A8A5A">Tip '+(tipIdx+1)+' of '+TIPS.length+' \u2022 New tip every day</div>';
    h+='<button onclick="closeTip()" style="display:block;width:100%;margin-top:12px;padding:10px;background:rgba(250,204,21,0.1);border:1px solid rgba(250,204,21,0.25);border-radius:8px;color:#FDE68A;font-size:'+(10+cs)+'px;font-family:inherit">Close</button>';
    h+='</div></div>';
  }

  // ========== MILESTONE POPUP ==========
  if(S.milestone){
    var isPerfect=S.milestone==='perfect';
    var msEmoji=isPerfect?'\uD83C\uDF89':'\uD83D\uDD25';
    var msTitle=isPerfect?'Perfect week!':'Streak earned!';
    var msSub=isPerfect?'All 37 foods — incredible!':'25+ foods this week!';
    h+='<div onclick="dismissMS()" style="position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px"><div onclick="event.stopPropagation()" style="text-align:center;background:linear-gradient(135deg,#1a2e1a,#0d1f15);border-radius:16px;border:1px solid '+(isPerfect?'rgba(250,204,21,0.3)':'rgba(34,197,94,0.3)')+';padding:30px 24px;max-width:300px;width:100%">';
    h+='<div style="font-size:56px;margin-bottom:12px">'+msEmoji+'</div>';
    h+='<h2 style="font-size:22px;color:'+(isPerfect?'#FDE68A':'#86EFAC')+';margin:0 0 4px;font-weight:400">'+msTitle+'</h2>';
    h+='<p style="font-size:12px;color:#7A9B7A;margin:0 0 20px">'+msSub+'</p>';
    h+='<button onclick="event.stopPropagation();dismissMS();shareWeek()" style="width:100%;padding:10px;margin-bottom:8px;background:linear-gradient(135deg,rgba(167,139,250,0.2),rgba(34,197,94,0.15));border:1px solid rgba(167,139,250,0.3);border-radius:10px;color:#C4DCC4;font-size:12px;font-family:inherit">\uD83D\uDCE4 Share this</button>';
    h+='<button onclick="dismissMS()" style="width:100%;padding:8px;background:none;border:1px solid rgba(107,155,107,0.15);border-radius:10px;color:#6B9B6B;font-size:10px;font-family:inherit">Keep going</button>';
    h+='</div></div>';
  }

  // ========== MODAL ==========
  if(S.modal!==null){
    var f=FOODS[S.modal];
    h+='<div onclick="cm()" style="position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;display:flex;align-items:center;justify-content:center;padding:12px"><div onclick="event.stopPropagation()" style="background:linear-gradient(135deg,#1a2e1a,#0d1f15);border-radius:12px;border:1px solid rgba(107,155,107,0.2);padding:16px;max-width:460px;width:100%;max-height:80vh;overflow:auto">';
    h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="font-size:'+(28+cs*2)+'px">'+f.emoji+'</span><div><h2 style="font-size:'+(16+cs)+'px;color:#86EFAC;margin:0">'+f.name+'</h2><div style="font-size:'+(9+cs)+'px;color:#6B9B6B">'+f.sub+'</div></div></div>';
    h+='<div style="font-size:'+(11+cs)+'px;color:#B4A468;font-style:italic;margin-bottom:8px;padding:6px 8px;background:rgba(250,204,21,0.06);border-radius:6px">'+f.fact+'</div>';
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:8px"><div style="background:rgba(34,197,94,0.08);border-radius:7px;padding:6px"><div style="font-size:'+(6+cs)+'px;color:#6B9B6B;letter-spacing:1px">SERVING</div><div style="font-size:'+(10+cs)+'px;color:#C4DCC4">'+f.por+'</div></div><div style="background:rgba(250,204,21,0.08);border-radius:7px;padding:6px"><div style="font-size:'+(6+cs)+'px;color:#B4A468;letter-spacing:1px">MIN DOSE</div><div style="font-size:'+(10+cs)+'px;color:#D4C48A">'+f.min+'</div></div></div>';
    h+='<div style="margin-bottom:8px"><div style="font-size:'+(7+cs)+'px;color:#6B9B6B;letter-spacing:1px;margin-bottom:3px">NUTRIENTS PER SERVING (% DV)</div><div>';
    Object.entries(f.nut).forEach(function(e){var k=e[0],v=e[1];var n=NI[k];if(!n)return;h+='<span style="display:inline-block;padding:2px 6px;border-radius:10px;font-size:'+(8+cs)+'px;margin:1px;border:1px solid '+(v>=50?'rgba(34,197,94,0.2)':'rgba(107,155,107,0.1)')+';background:'+(v>=50?'rgba(34,197,94,0.1)':'rgba(255,255,255,0.04)')+';color:'+(v>=100?'#22C55E':v>=50?'#86EFAC':'#7A9B7A')+'">'+n.n+' '+v+'%</span>'});
    h+='</div></div>';
    h+='<div style="margin-bottom:8px"><div style="font-size:'+(7+cs)+'px;color:#6B9B6B;letter-spacing:1px;margin-bottom:3px">RESEARCH</div><p style="font-size:'+(10+cs)+'px;line-height:1.6;color:#A4BCA4;margin:0">'+f.res+'</p></div>';
    h+='<div><div style="font-size:'+(7+cs)+'px;color:#6B9B6B;letter-spacing:1px;margin-bottom:3px">DEEPER SCIENCE</div><p style="font-size:'+(10+cs)+'px;line-height:1.6;color:#8AAB8A;margin:0">'+f.deep+'</p></div>';
    h+='<button onclick="cm()" style="width:100%;margin-top:10px;padding:8px;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);border-radius:7px;color:#86EFAC;font-size:'+(10+cs)+'px;font-family:inherit">Close</button></div></div>';
  }
  document.getElementById("app").innerHTML=h;
  applyZoom();
}
render();

// Register Service Worker for auto-updates
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(function(reg){
    // Check for updates every time app opens
    reg.update();
    // When new SW is found, reload to get fresh content
    reg.addEventListener('updatefound',function(){
      var nw=reg.installing;
      nw.addEventListener('statechange',function(){
        if(nw.state==='activated'){location.reload()}
      });
    });
  });
  // Also reload if controller changes (new SW took over)
  var refreshing=false;
  navigator.serviceWorker.addEventListener('controllerchange',function(){
    if(!refreshing){refreshing=true;location.reload()}
  });
}
</script>
</body>
</html>
